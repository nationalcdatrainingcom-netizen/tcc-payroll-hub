<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TCC Payroll Hub</title>
<style>
:root {
  --navy: #1B2A4A;
  --navy-dark: #0F1D33;
  --navy-light: #2A3F66;
  --gold: #C8963E;
  --gold-pale: #F5E6C8;
  --success: #2E7D4F;
  --success-bg: #E8F5EE;
  --warning: #E67E22;
  --warning-bg: #FFF3CD;
  --danger: #C0392B;
  --danger-bg: #FCEAE8;
  --info: #2471A3;
  --info-bg: #EBF4FF;
  --gray-50: #F8F9FA;
  --gray-100: #F0F2F5;
  --gray-200: #E2E5EA;
  --gray-300: #CDD1D9;
  --gray-400: #9BA3B0;
  --gray-600: #5A6270;
  --radius: 12px;
  --radius-sm: 8px;
  --shadow-sm: 0 1px 3px rgba(27,42,74,0.08);
  --shadow: 0 4px 12px rgba(27,42,74,0.12);
  --shadow-lg: 0 8px 24px rgba(27,42,74,0.16);
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Segoe UI',system-ui,-apple-system,sans-serif; background:var(--gray-100); color:var(--navy); min-height:100vh; }
.login-page { display:flex; align-items:center; justify-content:center; min-height:100vh; background:linear-gradient(135deg,var(--navy-dark),var(--navy-light)); }
.login-card { background:white; border-radius:var(--radius); padding:40px; width:380px; box-shadow:var(--shadow-lg); }
.login-card h1 { color:var(--navy); margin-bottom:8px; font-size:24px; }
.login-card p { color:var(--gray-400); margin-bottom:24px; font-size:14px; }
.form-group { margin-bottom:16px; }
.form-group label { display:block; font-size:13px; font-weight:600; color:var(--gray-600); margin-bottom:6px; }
.form-group input, .form-group select, .form-group textarea {
  width:100%; padding:10px 14px; border:1.5px solid var(--gray-200); border-radius:var(--radius-sm);
  font-size:14px; transition:border-color 0.2s; outline:none; background:white;
}
.form-group input:focus, .form-group select:focus { border-color:var(--gold); }
.form-row { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:12px; }
.form-row-3 { display:grid; grid-template-columns:1fr 1fr 1fr; gap:12px; margin-bottom:12px; }
.btn {
  padding:10px 20px; border:none; border-radius:var(--radius-sm); font-size:14px; font-weight:600;
  cursor:pointer; transition:all 0.2s; display:inline-flex; align-items:center; gap:6px;
}
.btn-primary { background:var(--navy); color:white; }
.btn-primary:hover { background:var(--navy-light); }
.btn-gold { background:var(--gold); color:white; }
.btn-gold:hover { background:#B8862E; }
.btn-outline { background:transparent; border:1.5px solid var(--gray-200); color:var(--gray-600); }
.btn-outline:hover { border-color:var(--navy); color:var(--navy); }
.btn-danger { background:var(--danger); color:white; }
.btn-sm { padding:5px 12px; font-size:12px; }
.btn-xs { padding:3px 8px; font-size:11px; }

.app-layout { display:flex; min-height:100vh; }
.sidebar {
  width:240px; background:var(--navy); color:white; padding:20px 0; display:flex; flex-direction:column;
  position:fixed; top:0; left:0; bottom:0; z-index:100; transition:transform 0.3s;
}
.sidebar-header { padding:0 20px 20px; border-bottom:1px solid var(--navy-light); }
.sidebar-header h2 { font-size:18px; color:var(--gold); }
.sidebar-header p { font-size:12px; color:var(--gray-400); margin-top:4px; }
.sidebar-nav { flex:1; padding:12px 0; overflow-y:auto; }
.nav-item {
  padding:10px 20px; cursor:pointer; font-size:13px; display:flex; align-items:center; gap:10px;
  transition:all 0.2s; color:rgba(255,255,255,0.7);
}
.nav-item:hover { background:var(--navy-light); color:white; }
.nav-item.active { background:var(--navy-light); color:var(--gold); border-right:3px solid var(--gold); }
.nav-item .nav-icon { width:20px; text-align:center; }
.sidebar-footer { padding:16px 20px; border-top:1px solid var(--navy-light); font-size:12px; color:var(--gray-400); }
.main-content { flex:1; margin-left:240px; padding:24px; }
.top-bar { display:flex; justify-content:space-between; align-items:center; margin-bottom:24px; }
.top-bar h1 { font-size:24px; font-weight:700; }
.top-bar .period-info { display:flex; align-items:center; gap:12px; }

.card { background:white; border-radius:var(--radius); box-shadow:var(--shadow-sm); margin-bottom:20px; overflow:hidden; }
.card-header { padding:16px 20px; border-bottom:1px solid var(--gray-100); display:flex; justify-content:space-between; align-items:center; }
.card-header h3 { font-size:16px; font-weight:700; }
.card-body { padding:20px; }

.data-table { width:100%; border-collapse:collapse; font-size:13px; }
.data-table th { background:var(--gray-50); padding:10px 12px; text-align:left; font-weight:600; color:var(--gray-600); border-bottom:2px solid var(--gray-200); font-size:11px; text-transform:uppercase; letter-spacing:0.5px; white-space:nowrap; }
.data-table td { padding:8px 12px; border-bottom:1px solid var(--gray-100); }
.data-table tr:hover { background:var(--gray-50); }
.table-scroll { overflow-x:auto; }

.stat-grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(200px, 1fr)); gap:16px; margin-bottom:20px; }
.stat-card { background:white; border-radius:var(--radius); padding:20px; box-shadow:var(--shadow-sm); }
.stat-card .stat-label { font-size:12px; color:var(--gray-400); font-weight:600; text-transform:uppercase; letter-spacing:0.5px; }
.stat-card .stat-value { font-size:28px; font-weight:700; margin-top:4px; color:var(--navy); }
.stat-card .stat-sub { font-size:12px; color:var(--gray-400); margin-top:4px; }

.center-tabs { display:flex; gap:8px; margin-bottom:20px; flex-wrap:wrap; }
.center-tab { padding:8px 20px; border-radius:20px; font-size:13px; font-weight:600; cursor:pointer; border:1.5px solid var(--gray-200); background:white; color:var(--gray-600); transition:all 0.2s; }
.center-tab:hover { border-color:var(--navy); }
.center-tab.active { background:var(--navy); color:white; border-color:var(--navy); }

.badge { padding:2px 8px; border-radius:10px; font-size:11px; font-weight:600; }
.badge-success { background:var(--success-bg); color:var(--success); }
.badge-warning { background:var(--warning-bg); color:var(--warning); }
.badge-danger { background:var(--danger-bg); color:var(--danger); }
.badge-info { background:var(--info-bg); color:var(--info); }

.modal-overlay { position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.5); display:none; align-items:center; justify-content:center; z-index:1000; }
.modal-overlay.active { display:flex; }
.modal-content { background:white; border-radius:var(--radius); max-width:700px; width:90%; max-height:85vh; overflow-y:auto; box-shadow:var(--shadow-lg); }
.modal-header { padding:20px; border-bottom:1px solid var(--gray-100); display:flex; justify-content:space-between; align-items:center; }
.modal-header h3 { font-size:18px; }
.modal-body { padding:20px; }
.modal-footer { padding:16px 20px; border-top:1px solid var(--gray-100); display:flex; justify-content:flex-end; gap:8px; }
.modal-close { background:none; border:none; font-size:24px; cursor:pointer; color:var(--gray-400); }

.toast { position:fixed; top:20px; right:20px; padding:12px 20px; border-radius:var(--radius-sm); color:white; font-size:14px; font-weight:600; z-index:2000; animation:slideIn 0.3s; }
@keyframes slideIn { from { transform:translateX(100%); opacity:0; } to { transform:translateX(0); opacity:1; } }

.pp-step { padding:20px; border:2px solid var(--gray-200); border-radius:var(--radius); margin-bottom:12px; transition:all 0.3s; }
.pp-step.completed { border-color:var(--success); background:var(--success-bg); }
.pp-step.active { border-color:var(--gold); background:rgba(200,150,62,0.05); }
.pp-step.locked { opacity:0.5; }

.sig-pad { border:2px solid var(--gray-200); border-radius:var(--radius-sm); background:white; cursor:crosshair; display:block; margin:10px auto; }

@media (max-width: 768px) {
  .sidebar { transform:translateX(-100%); }
  .sidebar.open { transform:translateX(0); }
  .main-content { margin-left:0; }
  .form-row, .form-row-3 { grid-template-columns:1fr; }
  .stat-grid { grid-template-columns:1fr 1fr; }
}
</style>
</head>
<body>
<div id="app"></div>

<div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this)closeModal()">
  <div class="modal-content" id="modalContent"></div>
</div>

<script>
// ========================
// APP STATE
// ========================
let currentUser = null;
let employees = [];
let selectedCenter = 'Peace Boulevard';
let currentPage = 'dashboard';
let currentPayPeriod = null;

const CENTERS = ['Peace Boulevard', 'Niles', 'Montessori'];
const PEACE_CLASSROOMS = [
  {section:'Infant Room'}, {section:'Young Toddler Room'}, {section:'Older Toddler Room'},
  {section:'Dinos (GSRP)'}, {section:'Penguins (GSRP)'}, {section:'School-Agers'},
  {section:'Admin / Office / Food Prep'}, {section:'Floaters'},
  {section:'Subs from other centers'}, {section:'Therapist / Unsupervised Volunteers'}, {section:'Supervised Volunteers'}
];
const NILES_CLASSROOMS = [
  {section:'Infant Room'}, {section:'Young Toddler Room'}, {section:'Older Toddler Room'},
  {section:'GSRP-1'}, {section:'GSRP-2'}, {section:'Strong Beginnings'},
  {section:'School-Agers'},
  {section:'Admin / Office / Food Prep'}, {section:'Floaters'},
  {section:'Subs from other centers'}, {section:'Therapist / Unsupervised Volunteers'}, {section:'Supervised Volunteers'}
];
const MONTESSORI_CLASSROOMS = [
  {section:'GSRP Orange'}, {section:'GSRP Blue'}, {section:'GSRP Pink'},
  {section:'Admin / Office / Food Prep'}, {section:'Floaters'},
  {section:'Subs from other centers'}, {section:'Therapist / Unsupervised Volunteers'}, {section:'Supervised Volunteers'}
];
const CENTER_CLASSROOMS = {
  'Peace Boulevard': PEACE_CLASSROOMS,
  'Niles': NILES_CLASSROOMS,
  'Montessori': MONTESSORI_CLASSROOMS
};

// ========================
// API HELPER
// ========================
async function api(url, opts = {}) {
  const config = { headers: { 'Content-Type': 'application/json' }, credentials: 'include', ...opts };
  if (opts.body && typeof opts.body === 'object' && !(opts.body instanceof FormData)) {
    config.body = JSON.stringify(opts.body);
  }
  const res = await fetch(url, config);
  if (!res.ok) {
    const err = await res.json().catch(() => ({ error: res.statusText }));
    throw new Error(err.error || err.message || res.statusText);
  }
  return res.json();
}

// ========================
// DATE HELPERS
// ========================
function fmtDate(d) {
  if (!d) return '';
  const s = typeof d === 'string' ? d : d.toISOString ? d.toISOString() : String(d);
  const m = s.match(/(\d{4})-(\d{2})-(\d{2})/);
  return m ? parseInt(m[2])+'/'+parseInt(m[3])+'/'+m[1].slice(2) : '';
}
function datVal(d) {
  if (!d) return '';
  const s = typeof d === 'string' ? d : d.toISOString ? d.toISOString() : String(d);
  const m = s.match(/(\d{4})-(\d{2})-(\d{2})/);
  return m ? m[0] : '';
}

function showToast(msg, type='success') {
  const toast = document.createElement('div');
  toast.className = 'toast';
  toast.style.background = type === 'success' ? 'var(--success)' : type === 'danger' ? 'var(--danger)' : 'var(--warning)';
  toast.textContent = msg;
  document.body.appendChild(toast);
  setTimeout(() => toast.remove(), 3000);
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('active');
}

async function loadEmployees() {
  try { employees = await api('/api/employees'); } catch(e) { employees = []; }
}

// ========================
// AUTH & LOGIN
// ========================
function renderLogin() {
  document.getElementById('app').innerHTML = `
  <div class="login-page">
    <div class="login-card">
      <h1 style="color:var(--gold)">TCC</h1>
      <h1>Payroll Hub</h1>
      <p>Sign in to manage payroll</p>
      <div class="form-group"><label>Username</label><input id="loginUser" placeholder="Enter username" onkeydown="if(event.key==='Enter')doLogin()"></div>
      <div class="form-group"><label>Password</label><input id="loginPass" type="password" placeholder="Enter password" onkeydown="if(event.key==='Enter')doLogin()"></div>
      <div id="loginError" style="color:var(--danger);font-size:13px;margin-bottom:12px;display:none"></div>
      <button class="btn btn-primary" style="width:100%" onclick="doLogin()">Sign In</button>
    </div>
  </div>`;
}

async function doLogin() {
  const username = document.getElementById('loginUser').value.trim();
  const password = document.getElementById('loginPass').value;
  try {
    const data = await api('/api/login', { method: 'POST', body: { username, password } });
    currentUser = data.user;
    await loadEmployees();
    renderApp();
  } catch(e) {
    document.getElementById('loginError').textContent = e.message;
    document.getElementById('loginError').style.display = 'block';
  }
}

async function doLogout() {
  await api('/api/logout', { method: 'POST' });
  currentUser = null;
  renderLogin();
}

async function checkSession() {
  try {
    const data = await api('/api/me');
    currentUser = data.user;
    await loadEmployees();
    renderApp();
  } catch(e) { renderLogin(); }
}

// ========================
// NAVIGATION
// ========================
function getNavItems() {
  const items = [
    { id:'dashboard', icon:'📊', label:'Dashboard', roles:['owner','payroll','hr','director'] },
    { id:'roster', icon:'👥', label:'Employee Roster', roles:['owner','payroll','hr','director'] },
    { id:'timeoff', icon:'📅', label:'Time Off', roles:['owner','payroll','hr','director'] },
    { id:'staffing', icon:'🏫', label:'Staffing Plan', roles:['owner','payroll','hr','director'] },
    { id:'payroll-workflow', icon:'✅', label:'Payroll Processing', roles:['owner','payroll','director'] },
    { id:'payroll-report', icon:'📑', label:'Payroll Report', roles:['owner','payroll','hr'] },
    { id:'overtime', icon:'⏱️', label:'Overtime View', roles:['owner','payroll'] },
    { id:'archives', icon:'🗃️', label:'Payroll Archives', roles:['owner','payroll'] },
    { id:'pay-increases', icon:'💰', label:'Pay Increases', roles:['owner','hr','payroll'] },
    { id:'pto-summary', icon:'🌴', label:'PTO Summary', roles:['owner','payroll','hr','director'] },
    { id:'change-requests', icon:'📝', label:'Change Requests', roles:['owner','payroll'] },
  ];
  return items.filter(i => i.roles.includes(currentUser.role));
}

// ========================
// MAIN APP SHELL
// ========================
function renderApp() {
  const navItems = getNavItems();
  const app = document.getElementById('app');
  app.innerHTML = `
  <div class="app-layout">
    <div class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <h2>TCC Payroll Hub</h2>
        <p>${currentUser.full_name} · ${currentUser.role === 'director' ? currentUser.center : currentUser.role.charAt(0).toUpperCase() + currentUser.role.slice(1)}</p>
      </div>
      <div class="sidebar-nav">
        ${navItems.map(n => `<div class="nav-item ${currentPage===n.id?'active':''}" onclick="navigateTo('${n.id}')"><span class="nav-icon">${n.icon}</span>${n.label}</div>`).join('')}
      </div>
      <div class="sidebar-footer">
        <div style="cursor:pointer;margin-bottom:8px" onclick="showChangePassword()">🔑 Change Password</div>
        <div style="cursor:pointer" onclick="doLogout()">🚪 Sign Out</div>
      </div>
    </div>
    <div class="main-content">
      <div class="top-bar">
        <div>
          <button class="btn btn-outline btn-sm" style="display:none" id="menuBtn" onclick="document.getElementById('sidebar').classList.toggle('open')">☰</button>
          <h1 id="pageTitle">Dashboard</h1>
        </div>
        <div class="period-info" id="periodInfo"></div>
      </div>
      <div id="pageContent"></div>
    </div>
  </div>`;
  
  if (window.innerWidth <= 768) document.getElementById('menuBtn').style.display = 'inline-flex';
  navigateTo(currentPage);
}

async function navigateTo(page) {
  currentPage = page;
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => { if (n.textContent.trim() === getNavItems().find(i=>i.id===page)?.label) n.classList.add('active'); });
  
  const titles = {
    'dashboard':'Dashboard','roster':'Employee Roster','timeoff':'Time Off',
    'staffing':'Staffing Plan','payroll-workflow':'Payroll Processing',
    'payroll-report':'Payroll Report','overtime':'Overtime View',
    'archives':'Payroll Archives','pay-increases':'Pay Increases',
    'pto-summary':'PTO Summary','change-requests':'Change Requests'
  };
  document.getElementById('pageTitle').textContent = titles[page] || page;
  
  // Load pay period info
  try {
    currentPayPeriod = await api('/api/pay-period');
    document.getElementById('periodInfo').innerHTML = `<span style="font-size:13px;color:var(--gray-400)">Pay Period: <strong>${currentPayPeriod.label}</strong></span>`;
  } catch(e) {}
  
  switch(page) {
    case 'dashboard': renderDashboard(); break;
    case 'roster': renderRoster(); break;
    case 'timeoff': renderTimeOff(); break;
    case 'staffing': renderStaffingPlan(); break;
    case 'payroll-workflow': renderPayrollWorkflow(); break;
    case 'payroll-report': renderPayrollReport(); break;
    case 'overtime': renderOvertimeView(); break;
    case 'archives': renderArchives(); break;
    case 'pay-increases': renderPayIncreases(); break;
    case 'pto-summary': renderPTOSummary(); break;
    case 'change-requests': renderChangeRequests(); break;
  }
}
// ========================
// DASHBOARD
// ========================
async function renderDashboard() {
  const el = document.getElementById('pageContent');
  const isAdmin = ['owner','payroll','hr'].includes(currentUser.role);
  
  let centerFilter = currentUser.role === 'director' ? currentUser.center : null;
  let centerEmps = centerFilter ? employees.filter(e => e.center === centerFilter) : employees;
  
  let html = `<div class="stat-grid">
    <div class="stat-card"><div class="stat-label">Active Staff</div><div class="stat-value">${centerEmps.length}</div></div>`;
  
  if (isAdmin) {
    const byCtr = {};
    employees.forEach(e => { byCtr[e.center] = (byCtr[e.center]||0)+1; });
    CENTERS.forEach(c => {
      html += `<div class="stat-card"><div class="stat-label">${c}</div><div class="stat-value">${byCtr[c]||0}</div></div>`;
    });
  }
  html += `</div>`;
  
  // Pay period status
  try {
    const ppStatus = await api('/api/payroll-period-status');
    const pp = ppStatus.payPeriod;
    html += `<div class="card"><div class="card-header"><h3>Current Pay Period: ${pp.label}</h3></div><div class="card-body">`;
    const centers = currentUser.role === 'director' ? [currentUser.center] : CENTERS;
    html += `<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:16px">`;
    
    for (const c of centers) {
      const p = ppStatus.periods[c];
      if (!p) continue;
      const steps = [
        { label:'Timecards Uploaded', done:p.timecards_uploaded },
        { label:'Time Off Submitted', done:p.timeoff_submitted },
        { label:'Director Close-out', done:p.director_closed },
      ];
      if (isAdmin) steps.push({ label:'Payroll Closed', done:p.payroll_closed });
      
      const completed = steps.filter(s => s.done).length;
      const pct = Math.round((completed / steps.length) * 100);
      
      html += `<div style="background:var(--gray-50);border-radius:var(--radius);padding:16px">
        <div style="font-weight:700;margin-bottom:8px">${c}</div>
        <div style="background:var(--gray-200);border-radius:4px;height:6px;margin-bottom:10px">
          <div style="background:${pct===100?'var(--success)':'var(--gold)'};width:${pct}%;height:100%;border-radius:4px;transition:width 0.3s"></div>
        </div>
        ${steps.map(s => `<div style="font-size:12px;margin-bottom:3px;color:${s.done?'var(--success)':'var(--gray-400)'}">
          ${s.done?'✅':'⬜'} ${s.label}
        </div>`).join('')}
      </div>`;
    }
    html += `</div></div></div>`;
  } catch(e) {}
  
  // Pending items
  if (isAdmin) {
    try {
      const pis = await api('/api/pay-increases');
      const pending = pis.filter(p => p.status === 'pending');
      if (pending.length > 0) {
        html += `<div class="card" style="border-left:4px solid var(--warning)"><div class="card-header"><h3>⚠️ Pending Pay Increases (${pending.length})</h3></div>
          <div class="card-body">${pending.map(p => `<div style="padding:8px 0;border-bottom:1px solid var(--gray-100)">
            <strong>${p.last_name}, ${p.first_name}</strong> (${p.center}) — $${parseFloat(p.current_rate).toFixed(2)} → $${parseFloat(p.proposed_rate).toFixed(2)}
            <span class="badge badge-warning">${p.reason_category}</span>
          </div>`).join('')}</div></div>`;
      }
    } catch(e) {}
    
    try {
      const crs = await api('/api/timeoff-change-requests');
      if (crs.length > 0) {
        html += `<div class="card" style="border-left:4px solid var(--info)"><div class="card-header"><h3>📝 Pending Change Requests (${crs.length})</h3></div>
          <div class="card-body">${crs.map(c => `<div style="padding:8px 0;border-bottom:1px solid var(--gray-100)">
            <strong>${c.last_name}, ${c.first_name}</strong> (${c.center}) — ${c.entry_date} — ${c.reason}
          </div>`).join('')}</div></div>`;
      }
    } catch(e) {}
  }
  
  el.innerHTML = html;
}

// ========================
// EMPLOYEE ROSTER
// ========================
async function renderRoster() {
  const el = document.getElementById('pageContent');
  const canEdit = ['owner','hr','payroll'].includes(currentUser.role);
  const canSeeRate = ['owner','payroll','hr'].includes(currentUser.role);
  
  let html = `<div class="center-tabs">`;
  if (currentUser.role !== 'director') {
    html += `<div class="center-tab ${selectedCenter==='all'?'active':''}" onclick="selectedCenter='all';renderRoster()">All Centers</div>`;
    CENTERS.forEach(c => {
      html += `<div class="center-tab ${selectedCenter===c?'active':''}" onclick="selectedCenter='${c}';renderRoster()">${c}</div>`;
    });
  }
  html += `</div>`;
  
  if (canEdit) {
    html += `<div style="display:flex;gap:8px;margin-bottom:16px">
      <button class="btn btn-primary btn-sm" onclick="showAddEmployee()">+ Add Employee</button>

async function renderTimeOff() {
  const el = document.getElementById('pageContent');
  const canEdit = true;
  const isDirector = currentUser.role === 'director';
  
  const now = new Date();
  if (!window._toMonth) window._toMonth = now.getMonth() + 1;
  if (!window._toYear) window._toYear = now.getFullYear();
  
  let html = `<div class="center-tabs">`;
  if (!isDirector) {
    CENTERS.forEach(c => {
      html += `<div class="center-tab ${selectedCenter===c?'active':''}" onclick="selectedCenter='${c}';renderTimeOff()">${c}</div>`;
    });
  }
  html += `</div>`;
  
  html += `<div style="display:flex;gap:8px;align-items:center;margin-bottom:16px">
    <button class="btn btn-outline btn-sm" onclick="window._toMonth--;if(window._toMonth<1){window._toMonth=12;window._toYear--}renderTimeOff()">◀</button>
    <span style="font-weight:600;min-width:140px;text-align:center">${new Date(window._toYear, window._toMonth-1).toLocaleDateString('en-US',{month:'long',year:'numeric'})}</span>
    <button class="btn btn-outline btn-sm" onclick="window._toMonth++;if(window._toMonth>12){window._toMonth=1;window._toYear++}renderTimeOff()">▶</button>
    <button class="btn btn-outline btn-sm" onclick="window._toMonth=${now.getMonth()+1};window._toYear=${now.getFullYear()};renderTimeOff()">Today</button>
  </div>`;
  
  const center = isDirector ? currentUser.center : selectedCenter;
  try {
    const entries = await api(`/api/time-off?month=${window._toMonth}&year=${window._toYear}&center=${encodeURIComponent(center)}`);
    const centerEmps = employees.filter(e => e.center === center).sort((a,b) => a.last_name.localeCompare(b.last_name));
    
    const daysInMonth = new Date(window._toYear, window._toMonth, 0).getDate();
    const dates = [];
    for (let d = 1; d <= daysInMonth; d++) {
      const dt = new Date(window._toYear, window._toMonth - 1, d);
      dates.push({ day: d, date: dt, dayName: dt.toLocaleDateString('en-US',{weekday:'short'}), isWeekend: dt.getDay()===0||dt.getDay()===6 });
    }
    
    html += `<div class="card"><div class="card-body"><div class="table-scroll"><table class="data-table" style="font-size:11px">
      <thead><tr><th style="position:sticky;left:0;background:var(--gray-50);z-index:1">Name</th>`;
    dates.forEach(d => {
      html += `<th style="text-align:center;min-width:28px;${d.isWeekend?'background:var(--gray-200)':''}"><div style="font-size:9px">${d.dayName.charAt(0)}</div>${d.day}</th>`;
    });
    html += `<th>P</th><th>U</th></tr></thead><tbody>`;
    
    centerEmps.forEach(emp => {
      const empEntries = entries.filter(e => e.employee_id === emp.id);
      const entryMap = {};
      empEntries.forEach(e => {
        const day = new Date(e.entry_date).getDate();
        entryMap[day] = e;
      });
      
      html += `<tr><td style="position:sticky;left:0;background:white;z-index:1;white-space:nowrap;font-weight:600">${emp.last_name}, ${emp.first_name.charAt(0)}.</td>`;
      let pCount = 0, uCount = 0;
      dates.forEach(d => {
        const entry = entryMap[d.day];
        const iso = `${window._toYear}-${String(window._toMonth).padStart(2,'0')}-${String(d.day).padStart(2,'0')}`;
        let cellStyle = d.isWeekend ? 'background:var(--gray-200);' : '';
        let cellContent = '';
        if (entry) {
          if (entry.entry_type === 'P') { cellStyle += 'background:var(--info-bg);'; cellContent = '<span style="color:var(--info);font-weight:700">P</span>'; pCount++; }
          else { cellStyle += 'background:var(--warning-bg);'; cellContent = '<span style="color:var(--warning);font-weight:700">U</span>'; uCount++; }
        }
        if (canEdit && !d.isWeekend) {
          html += `<td style="text-align:center;cursor:pointer;min-width:28px;${cellStyle}" onclick="toggleTimeOff(${emp.id},'${iso}',this)">${cellContent}</td>`;
        } else {
          html += `<td style="text-align:center;min-width:28px;${cellStyle}">${cellContent}</td>`;
        }
      });
      html += `<td style="text-align:center;font-weight:600;color:var(--info)">${pCount||''}</td>`;
      html += `<td style="text-align:center;font-weight:600;color:var(--warning)">${uCount||''}</td>`;
      html += `</tr>`;
    });
    
    html += `</tbody></table></div></div></div>`;
  } catch(e) { html += `<div style="color:var(--danger)">Error: ${e.message}</div>`; }
  
  el.innerHTML = html;
}

async function toggleTimeOff(empId, date, cell) {
  const currentContent = cell.innerHTML.trim();
  let newType = null;
  
  if (currentContent === '') newType = 'P';
  else if (currentContent.includes('>P<')) newType = 'U';
  else { // Remove
    try {
      const entries = await api(`/api/time-off?month=${window._toMonth}&year=${window._toYear}`);
      const entry = entries.find(e => e.employee_id === empId && new Date(e.entry_date).toISOString().split('T')[0] === date);
      if (entry) {
        await api(`/api/time-off/${entry.id}`, { method: 'DELETE' });
        renderTimeOff();
      }
    } catch(e) {
      if (e.message === 'past_period') {
        if (confirm('This date is in a past pay period. Submit a change request?')) {
          showChangeRequestModal(empId, date, null);
        }
      } else { alert('Error: ' + e.message); }
    }
    return;
  }
  
  try {
    await api('/api/time-off', { method: 'POST', body: { employee_id: empId, entry_date: date, entry_type: newType } });
    renderTimeOff();
  } catch(e) {
    if (e.message === 'past_period') {
      if (confirm('This date is in a past pay period. Submit a change request?')) {
        showChangeRequestModal(empId, date, newType);
      }
    } else { alert('Error: ' + e.message); }
  }
}

    let html = `<div class="card"><div class="card-header"><h3>Pending Change Requests</h3></div>

    if (crs.length === 0) {
      html += `<p style="color:var(--gray-400)">No pending change requests.</p>`;
    } else {
      crs.forEach(cr => {
        html += `<div style="padding:12px;border:1px solid var(--gray-200);border-radius:var(--radius-sm);margin-bottom:8px">
          <div style="display:flex;justify-content:space-between;align-items:center">
            <div><strong>${cr.last_name}, ${cr.first_name}</strong> (${cr.center}) — ${fmtDate(cr.entry_date)} — ${cr.requested_type==='P'?'Paid':cr.requested_type==='U'?'Unpaid':'Remove'}</div>
            <div style="display:flex;gap:6px">
              <button class="btn btn-sm" style="background:var(--success);color:white" onclick="approveChange(${cr.id})">✓ Approve</button>
              <button class="btn btn-outline btn-sm" onclick="denyChange(${cr.id})">✗ Deny</button>
            </div>
          </div>
          <div style="font-size:12px;color:var(--gray-400);margin-top:4px">${cr.reason||''}</div>
        </div>`;
      });
    }
    html += `</div></div>`;
    el.innerHTML = html;
  } catch(e) { el.innerHTML = `<div style="color:var(--danger)">Error: ${e.message}</div>`; }
}

async function approveChange(id) {
  try { await api(`/api/timeoff-change-requests/${id}/approve`, { method: 'POST' }); renderChangeRequests(); showToast('Change approved'); } catch(e) { alert(e.message); }
}
async function denyChange(id) {
  try { await api(`/api/timeoff-change-requests/${id}/deny`, { method: 'POST' }); renderChangeRequests(); showToast('Change denied','warning'); } catch(e) { alert(e.message); }
}
// ========================
// STAFFING PLAN
// ========================
async function renderStaffingPlan() {
  const el = document.getElementById('pageContent');
  const canEdit = ['owner','hr','director'].includes(currentUser.role);
  const canManageSubs = ['owner','hr','payroll'].includes(currentUser.role);
  
  let html = `<div class="center-tabs">`;
  if (currentUser.role !== 'director') {
    CENTERS.forEach(c => {
      html += `<div class="center-tab ${selectedCenter===c?'active':''}" onclick="selectedCenter='${c}';renderStaffingPlan()">${c}</div>`;
    });
  }
  html += `</div>`;
  
  const center = currentUser.role === 'director' ? currentUser.center : (selectedCenter === 'all' ? 'Peace Boulevard' : selectedCenter);
  if (selectedCenter === 'all' && currentUser.role !== 'director') selectedCenter = 'Peace Boulevard';
  
  // Signature display
  try {
    const sig = await api('/api/settings/signature');
    if (sig && sig.value) {
      html += `<div style="display:flex;align-items:center;gap:16px;margin-bottom:20px;background:white;padding:12px 20px;border-radius:var(--radius);box-shadow:var(--shadow-sm)">
        <span style="font-size:12px;font-weight:600;color:var(--gray-600)">Licensee Signature:</span>
        <img src="${sig.value}" style="height:40px">
        <span style="font-size:12px;color:var(--gray-400)">Date: ${new Date(sig.updated_at).toLocaleDateString()}</span>
      </div>`;
    }
  } catch(e) {}
  
  // Load staffing plan data from DB
  let spData = [];
  try { spData = await api('/api/staffing-plan'); } catch(e) {}
  
  // Filter to this center and deduplicate
  const seen = new Set();
  const centerData = spData.filter(s => {
    if (s.center !== center) return false;
    const key = s.employee_id ? `emp-${s.employee_id}-${s.entry_type || 'staff'}` : `sp-${s.id}`;
    if (seen.has(key)) return false;
    seen.add(key);
    return true;
  });
  
  // Find unassigned staff (only regular staff, not subs/externals)
  const assignedIds = new Set(centerData.filter(s => (s.entry_type || 'staff') === 'staff').map(s => s.employee_id));
  const centerEmployees = employees.filter(e => e.center === center);
  const unassigned = centerEmployees.filter(e => !assignedIds.has(e.id));
  
  // Group by classroom
  const classroomMap = {};
  centerData.forEach(s => {
    if (!classroomMap[s.classroom]) classroomMap[s.classroom] = [];
    classroomMap[s.classroom].push(s);
  });
  
  const template = CENTER_CLASSROOMS[center] || PEACE_CLASSROOMS;
  const orderedClassrooms = template.map(t => t.section);
  Object.keys(classroomMap).forEach(c => {
    if (!orderedClassrooms.includes(c)) orderedClassrooms.push(c);
  });
  
  window._spCenter = center;
  window._spClassrooms = orderedClassrooms;
  
  // ---- UNASSIGNED STAFF SECTION ----
  if (canEdit && unassigned.length > 0) {
    html += `<div class="card" style="border-left:4px solid var(--warning);margin-bottom:20px">
      <div class="card-header"><h3>⚠️ Needs Room/Role Assignment (${unassigned.length})</h3></div>
      <div class="card-body">
      <div style="display:flex;flex-wrap:wrap;gap:8px">`;
    unassigned.forEach(e => {
      html += `<div style="display:inline-flex;align-items:center;gap:6px;padding:8px 14px;background:var(--warning-bg);border:1.5px solid var(--warning);border-radius:20px;font-size:12px;font-weight:600">
        👤 ${e.last_name}, ${e.first_name}
        <span style="font-size:10px;color:var(--gray-400)">${e.position||''}</span>
        <button class="btn btn-outline btn-sm" style="padding:2px 8px;font-size:10px;margin-left:4px" onclick="quickAssign(${e.id},'${center.replace(/'/g,"\\'")}')">Assign →</button>
      </div>`;
    });
    html += `</div></div></div>`;
  }
  
  // ---- STAFFING PLAN TABLE ----
  html += `<div class="card"><div class="card-header">
    <h3>Staffing Plan — ${center}</h3>
    <div style="display:flex;gap:8px;align-items:center">
      <div style="font-size:11px;color:var(--gray-400)">License #DC110415511 · Mary Wardlaw, Licensee</div>
      ${canEdit ? `<button class="btn btn-primary btn-sm" onclick="showAddStaffingEntry('${center}')">+ Add Staff</button>` : ''}
      <button class="btn btn-outline btn-sm" onclick="window.open('/api/staffing-plan/print/${encodeURIComponent(center)}','_blank')">🖨️ Print</button>
    </div>
  </div><div class="card-body"><div class="table-scroll">
    <table class="data-table" style="font-size:11px">
      <thead><tr>
        ${canEdit ? '<th style="width:30px"></th>' : ''}
        <th>Classroom</th><th>Role</th><th>Name</th><th>Start Date</th><th>Schedule</th>
        <th>Orientation</th><th>CPR/FA</th><th>H&S ABC</th><th>H&S Ref.</th>
        <th>CCBC</th><th>Fingerprint</th><th>Eligible</th><th>Abuse/Neglect</th>
        <th>Last Eval</th><th>Promoted</th><th>Room Assgn</th>
        <th>Education</th><th>Hours/CEUs</th><th>I/T Training</th>
        ${canEdit ? '<th>Actions</th>' : ''}
      </tr></thead><tbody>`;
  
  // Helper for highlighting empty compliance cells
  function cc(val, required) {
    const formatted = fmtDate(val);
    if (!formatted && required) return '<td style="background:#FFF3CD;color:var(--warning);font-weight:600;text-align:center">⚠</td>';
    return '<td>' + formatted + '</td>';
  }
  
  // Helper for external/volunteer rows - only show applicable fields
  function ccExt(val, applicable) {
    if (!applicable) return '<td style="background:var(--gray-100);color:var(--gray-300);text-align:center;font-size:9px">n/a</td>';
    const formatted = fmtDate(val);
    if (!formatted) return '<td style="background:#FFF3CD;color:var(--warning);font-weight:600;text-align:center">⚠</td>';
    return '<td>' + formatted + '</td>';
  }
  
  orderedClassrooms.forEach(classroom => {
    const staff = classroomMap[classroom] || [];
    const colSpan = canEdit ? 21 : 19;
    const isSubs = classroom === 'Subs from other centers';
    const isTherapists = classroom === 'Therapist / Unsupervised Volunteers';
    const isVolunteers = classroom === 'Supervised Volunteers';
    
    html += `<tr style="background:var(--navy);color:white">
      <td colspan="${colSpan}" style="padding:8px 14px;font-weight:700">
        <div style="display:flex;align-items:center;justify-content:space-between">
          <span>${classroom}</span>
          <span style="display:flex;gap:6px">`;
    
    // Add buttons for special sections (owner/hr/payroll only)
    if (canManageSubs && isSubs) {
      html += `<button style="background:var(--gold);color:var(--navy-dark);border:none;border-radius:4px;padding:3px 10px;font-size:10px;font-weight:700;cursor:pointer" onclick="showPullSubModal('${center.replace(/'/g,"\\'")}')">+ Pull Staff from Another Center</button>`;
    }
    if (canManageSubs && (isTherapists || isVolunteers)) {
      html += `<button style="background:var(--gold);color:var(--navy-dark);border:none;border-radius:4px;padding:3px 10px;font-size:10px;font-weight:700;cursor:pointer" onclick="showAddExternalModal('${center.replace(/'/g,"\\'")}','${classroom.replace(/'/g,"\\'")}')">+ Add ${isTherapists ? 'Therapist/Volunteer' : 'Volunteer'}</button>`;
    }
    
    html += `</span></div></td></tr>`;
    
    if (staff.length === 0) {
      html += `<tr><td colspan="${colSpan}" style="color:var(--gray-300);font-style:italic;padding-left:30px">No staff assigned</td></tr>`;
    }
    
    staff.forEach(s => {
      const isSub = s.entry_type === 'sub';
      const isExternal = s.entry_type === 'external';
      const nameDisplay = (s.first_name||'') + ' ' + (s.last_name||'');
      
      // Build name with badges
      let nameBadges = '';
      if (isSub && s.source_center) {
        nameBadges += ` <span style="font-size:9px;background:var(--info-bg);color:var(--info);padding:1px 6px;border-radius:4px;font-weight:600">📍 ${s.source_center}</span>`;
      }
      if (isExternal) {
        nameBadges += ` <span style="font-size:9px;background:var(--gold-pale);color:var(--gold);padding:1px 6px;border-radius:4px;font-weight:600">External</span>`;
      }
      if (isSub) {
        nameBadges += ` <span style="font-size:9px;background:rgba(46,125,79,0.1);color:var(--success);padding:1px 6px;border-radius:4px;font-weight:600">🔄 Live Sync</span>`;
      }
      
      // Determine if this is a volunteer/therapist (limited compliance fields)
      const isVolunteerEntry = isExternal && (classroom === 'Therapist / Unsupervised Volunteers' || classroom === 'Supervised Volunteers');
      
      html += `<tr data-sp-id="${s.id}" style="${isSub ? 'background:rgba(36,113,163,0.04)' : isExternal ? 'background:rgba(200,150,62,0.04)' : ''}">
        ${canEdit && !isSub ? `<td style="text-align:center;cursor:pointer" title="Move to different classroom" onclick="moveStaffEntry(${s.id},'${(s.first_name||'')} ${(s.last_name||'')}')"><span style="font-size:14px;cursor:grab">☰</span></td>` : canEdit ? '<td></td>' : ''}
        <td></td>
        <td><strong>${s.role_in_room || ''}</strong></td>
        <td style="white-space:nowrap">${nameDisplay}${nameBadges}</td>
        <td>${fmtDate(s.emp_start_date || s.external_start_date)}</td>
        <td style="font-size:10px">${s.emp_schedule || ''}</td>`;
      
      if (isVolunteerEntry) {
        // Volunteers/therapists: only fingerprint, eligible, abuse/neglect apply
        html += ccExt(null, false); // orientation - n/a
        html += ccExt(null, false); // CPR - n/a
        html += ccExt(null, false); // H&S ABC - n/a
        html += ccExt(null, false); // H&S Refresher - n/a
        html += ccExt(null, false); // CCBC - n/a
        html += ccExt(s.fingerprinting_date, true); // fingerprint - required
        html += ccExt(s.date_eligible, true); // eligible - required
        html += ccExt(s.abuse_neglect_statement, true); // abuse/neglect - required
        html += ccExt(null, false); // last eval - n/a
        html += ccExt(null, false); // promoted - n/a
        html += ccExt(null, false); // room assigned - n/a
        html += '<td></td><td></td><td></td>'; // education, hours, I/T - n/a
      } else {
        // Regular staff and subs get all compliance fields
        html += cc(s.orientation_date, true);
        html += cc(s.cpr_first_aid_date, true);
        html += cc(s.health_safety_abc_date, true);
        html += cc(s.health_safety_refresher, true);
        html += cc(s.ccbc_consent_date, true);
        html += cc(s.fingerprinting_date, true);
        html += cc(s.date_eligible, true);
        html += cc(s.abuse_neglect_statement, true);
        html += cc(s.last_evaluation, false);
        html += cc(s.date_promoted_lead, false);
        html += cc(s.date_assigned_room, false);
        html += `<td style="font-size:10px">${s.education || ''}</td>`;
        html += `<td style="font-size:10px">${s.semester_hours || ''}</td>`;
        html += `<td style="font-size:10px">${s.infant_toddler_training || ''}</td>`;
      }
      
      if (canEdit) {
        if (isSub) {
          // Subs: compliance is read-only (live synced), can only remove
          html += `<td style="white-space:nowrap">
            ${canManageSubs ? `<button class="btn btn-outline btn-sm" onclick="removeStaffingEntry(${s.id})" title="Remove sub" style="color:var(--danger)">✕</button>` : ''}
          </td>`;
        } else if (isExternal) {
          // Externals: can edit limited fields and remove
          html += `<td style="white-space:nowrap">
            ${canManageSubs ? `<button class="btn btn-outline btn-sm" onclick="editExternalEntry(${s.id})" title="Edit">✏️</button>
            <button class="btn btn-outline btn-sm" onclick="removeStaffingEntry(${s.id})" title="Remove" style="color:var(--danger)">✕</button>` : ''}
          </td>`;
        } else {
          // Regular staff: full edit
          html += `<td style="white-space:nowrap">
            <button class="btn btn-outline btn-sm" onclick="editStaffingEntry(${s.id})" title="Edit">✏️</button>
            <button class="btn btn-outline btn-sm" onclick="removeStaffingEntry(${s.id})" title="Remove" style="color:var(--danger)">✕</button>
          </td>`;
        }
      }
      
      html += `</tr>`;
    });
  });
  
  html += `</tbody></table></div></div></div>`;
  
  // Legend
  html += `<div style="display:flex;gap:16px;flex-wrap:wrap;margin-top:12px;font-size:11px;color:var(--gray-600)">
    <span><span style="display:inline-block;width:12px;height:12px;background:rgba(36,113,163,0.15);border:1px solid var(--info);border-radius:2px;vertical-align:middle;margin-right:4px"></span> Cross-center sub (compliance synced live from home center)</span>
    <span><span style="display:inline-block;width:12px;height:12px;background:rgba(200,150,62,0.15);border:1px solid var(--gold);border-radius:2px;vertical-align:middle;margin-right:4px"></span> External person (therapist/volunteer — not on payroll)</span>
    <span style="color:var(--gray-300)">n/a = field does not apply to this person type</span>
  </div>`;
  
  el.innerHTML = html;
}

// PULL SUB FROM ANOTHER CENTER (Option B: Live Lookup)

async function showPullSubModal(targetCenter) {
  let html = `<div class="modal-header"><h3>Pull Staff from Another Center</h3><button class="modal-close" onclick="closeModal()">&times;</button></div>
    <div class="modal-body">
      <p style="font-size:13px;color:var(--gray-600);margin-bottom:4px">Select an employee from another center to add as a sub at <strong>${targetCenter}</strong>.</p>
      <p style="font-size:12px;color:var(--info);margin-bottom:16px">Their compliance dates will be <strong>synced live</strong> from their home center's staffing plan — Amy only needs to update dates in one place.</p>
      <div id="pullSubList"><em style="color:var(--gray-400)">Loading staff from other centers...</em></div>
    </div>
    <div class="modal-footer"><button class="btn btn-outline" onclick="closeModal()">Close</button></div>`;
  
  document.getElementById('modalContent').innerHTML = html;
  document.getElementById('modalOverlay').classList.add('active');
  
  try {
    const available = await api(`/api/staffing-plan/available-subs/${encodeURIComponent(targetCenter)}`);
    
    if (available.length === 0) {
      document.getElementById('pullSubList').innerHTML = '<p style="color:var(--gray-400)">No staff found at other centers.</p>';
      return;
    }
    
    const byCenter = {};
    available.forEach(e => {
      if (!byCenter[e.center]) byCenter[e.center] = [];
      byCenter[e.center].push(e);
    });
    
    let listHtml = '';
    for (const [ctr, emps] of Object.entries(byCenter)) {
      listHtml += `<div style="margin-bottom:16px">
        <div style="font-size:13px;font-weight:700;color:var(--navy);margin-bottom:8px;padding-bottom:4px;border-bottom:2px solid var(--gold-pale)">📍 ${ctr}</div>`;
      
      emps.forEach(e => {
        const already = e.already_added;
        listHtml += `<div style="display:flex;align-items:center;justify-content:space-between;padding:8px 12px;border-radius:8px;margin-bottom:4px;${already ? 'background:var(--success-bg)' : 'background:var(--gray-50)'}">
          <div>
            <strong>${e.last_name}, ${e.first_name}</strong>
            <span style="font-size:11px;color:var(--gray-400);margin-left:8px">${e.position || ''} · ${e.classroom || ''}</span>
          </div>
          ${already 
            ? '<span style="font-size:11px;color:var(--success);font-weight:600">✅ Already added</span>'
            : `<button class="btn btn-primary btn-sm" onclick="doPullSub(${e.id},'${targetCenter.replace(/'/g,"\\'")}','${e.first_name} ${e.last_name}')">+ Add as Sub</button>`
          }
        </div>`;
      });
      
      listHtml += `</div>`;
    }
    
    document.getElementById('pullSubList').innerHTML = listHtml;
  } catch(e) {
    document.getElementById('pullSubList').innerHTML = `<div style="color:var(--danger)">Error: ${e.message}</div>`;
  }
}

async function doPullSub(employeeId, targetCenter, empName) {
  try {
    await api('/api/staffing-plan/pull-sub', { method: 'POST', body: {
      employee_id: employeeId,
      target_center: targetCenter,
      classroom: 'Subs from other centers'
    }});
    showPullSubModal(targetCenter);
  } catch(e) { alert('Error: ' + e.message); }
}

async function doUpdateExternal(spId, center, classroom) {
  try {
    await api(`/api/staffing-plan/${spId}`, { method: 'PUT', body: {
      employee_id: null,

async function renderPayrollWorkflow() {
  const el = document.getElementById('pageContent');
  const isDirector = currentUser.role === 'director';
  const isPayroll = ['owner','payroll'].includes(currentUser.role);
  
  // Pay period selector
  let html = `<div style="display:flex;gap:8px;align-items:center;margin-bottom:20px">
    <label style="font-weight:600;font-size:13px">Pay Period:</label>
    <select id="ppSelector" onchange="renderPayrollWorkflow()" style="padding:8px 12px;border:1.5px solid var(--gray-200);border-radius:var(--radius-sm)">`;
  
  try {
    const periods = await api('/api/pay-periods/list');
    const currentPP = await api('/api/pay-period');
    periods.forEach(p => {
      const selected = p.start === currentPP.start ? 'selected' : '';
      html += `<option value="${p.start}" ${selected}>${p.label}${p.isCurrent?' (Current)':''}</option>`;
    });
  } catch(e) {}
  html += `</select></div>`;
  
  try {
    const ppStatus = await api('/api/payroll-period-status');
    const pp = ppStatus.payPeriod;
    const centers = isDirector ? [currentUser.center] : CENTERS;
    
    for (const center of centers) {
      const p = ppStatus.periods[center];
      if (!p) continue;
      
      html += `<div class="card" style="margin-bottom:20px"><div class="card-header"><h3>${center}</h3></div><div class="card-body">`;
      
      // Step 1: Upload Timecards
      const step1Class = p.timecards_uploaded ? 'completed' : 'active';
      html += `<div class="pp-step ${step1Class}">
        <div style="display:flex;justify-content:space-between;align-items:center">
          <div><strong>${p.timecards_uploaded?'✅':'1️⃣'} Timecards</strong>
            ${p.timecards_uploaded ? `<span style="font-size:12px;color:var(--gray-400)"> · Signed by ${p.timecards_signed_by}</span>` : ''}
          </div>
          ${!p.timecards_uploaded && (isDirector || isPayroll) ? `<div style="display:flex;gap:6px">
            <button class="btn btn-outline btn-sm" onclick="showTimecardUpload('${center}','${pp.start}','${pp.end}')">Upload CSV</button>
            <button class="btn btn-primary btn-sm" onclick="signTimecards('${center}','${pp.start}','${pp.end}')">Sign & Verify</button>
          </div>` : ''}
        </div>
      </div>`;
      
      // Step 2: Time Off
      const step2Class = p.timeoff_submitted ? 'completed' : p.timecards_uploaded ? 'active' : 'locked';
      html += `<div class="pp-step ${step2Class}">
        <div style="display:flex;justify-content:space-between;align-items:center">
          <div><strong>${p.timeoff_submitted?'✅':'2️⃣'} Time Off</strong>
            ${p.timeoff_submitted ? `<span style="font-size:12px;color:var(--gray-400)"> · Submitted by ${p.timeoff_submitted_by}</span>` : ''}
            ${p.change_request_pending ? `<span class="badge badge-warning" style="margin-left:8px">Change Request Pending</span>` : ''}
          </div>
          <div style="display:flex;gap:6px">
            ${p.timeoff_submitted && isDirector && !p.payroll_closed ? `<button class="btn btn-outline btn-sm" onclick="unsubmitTimeoff('${center}','${pp.start}','${pp.end}')">Unsubmit</button>` : ''}
            ${!p.timeoff_submitted && (isDirector || isPayroll) ? `<button class="btn btn-primary btn-sm" onclick="submitTimeoff('${center}','${pp.start}','${pp.end}')">Submit Time Off</button>` : ''}
            ${p.change_request_pending && isPayroll ? `<button class="btn btn-sm" style="background:var(--success);color:white" onclick="approveTimeoffChange('${center}','${pp.start}','${pp.end}')">Approve Change</button>
            <button class="btn btn-outline btn-sm" onclick="denyTimeoffChange('${center}','${pp.start}','${pp.end}')">Deny</button>` : ''}
          </div>
        </div>
      </div>`;
      
      // Step 3: Director Close
      const step3Class = p.director_closed ? 'completed' : (p.timecards_uploaded && p.timeoff_submitted) ? 'active' : 'locked';
      html += `<div class="pp-step ${step3Class}">
        <div style="display:flex;justify-content:space-between;align-items:center">
          <div><strong>${p.director_closed?'✅':'3️⃣'} Director Close-out</strong>
            ${p.director_closed ? `<span style="font-size:12px;color:var(--gray-400)"> · ${p.director_closed_by}</span>` : ''}
          </div>
          ${!p.director_closed && (isDirector || isPayroll) && p.timecards_uploaded && p.timeoff_submitted ?
            `<button class="btn btn-gold btn-sm" onclick="directorClose('${center}','${pp.start}','${pp.end}')">Sign & Close</button>` : ''}
        </div>
      </div>`;
      
      html += `</div></div>`;
    }
    
    // Final: Payroll close
    if (isPayroll) {
      const allClosed = centers.every(c => ppStatus.periods[c]?.director_closed);
      const payrollClosed = centers.some(c => ppStatus.periods[c]?.payroll_closed);
      
      html += `<div class="card"><div class="card-body">
        <div class="pp-step ${payrollClosed ? 'completed' : allClosed ? 'active' : 'locked'}">
          <div style="display:flex;justify-content:space-between;align-items:center">
            <div><strong>${payrollClosed?'✅':'4️⃣'} Process Payroll</strong></div>
            ${!payrollClosed && allClosed ? `<div style="display:flex;gap:8px">
              <button class="btn btn-outline btn-sm" onclick="window.open('/api/payroll-report/pdf','_blank')">📄 Generate PDF</button>
              <button class="btn btn-gold" onclick="payrollClose('${ppStatus.payPeriod.start}','${ppStatus.payPeriod.end}')">Process & Close Payroll</button>
            </div>` : ''}
          </div>
        </div>
      </div></div>`;
    }
  } catch(e) { html += `<div style="color:var(--danger)">Error: ${e.message}</div>`; }
  
  el.innerHTML = html;
}

    </div>

async function doTimecardUpload() {
  const fileInput = document.getElementById('timecardFile');
  if (!fileInput.files.length) return alert('Select a CSV file');
  const formData = new FormData();
  formData.append('file', fileInput.files[0]);
  try {
    const result = await fetch('/api/import-timecard', { method: 'POST', body: formData, credentials: 'include' }).then(r => r.json());
    if (result.error) throw new Error(result.error);
    let previewHtml = `<div style="margin-top:16px;padding:16px;background:var(--success-bg);border-radius:var(--radius)">
      <strong>Import Results</strong><br>
      Rows: ${result.imported} · Matched: ${result.matched} · Saved: ${result.savedDays} days
      ${result.unmatchedNames.length > 0 ? `<div style="margin-top:8px;color:var(--warning)">Unmatched: ${result.unmatchedNames.join(', ')}</div>` : ''}
    </div>`;
    document.getElementById('timecardPreview').innerHTML = previewHtml;
    showToast('Timecards imported');
  } catch(e) { alert('Error: ' + e.message); }
}

async function unsubmitTimeoff(center, start, end) {

    await api('/api/payroll-workflow/unsubmit-timeoff', { method: 'POST', body: { period_start: start, period_end: end, center } });
    renderPayrollWorkflow();
  } catch(e) {
    if (e.message.includes('locked')) {
      const reason = prompt('Payroll processing has begun. Enter reason for change request:');
      if (reason) {
        await api('/api/payroll-workflow/request-timeoff-change', { method: 'POST', body: { period_start: start, period_end: end, center, reason } });
        showToast('Change request submitted');
        renderPayrollWorkflow();
      }
    } else { alert(e.message); }
  }
}

async function approveTimeoffChange(center, start, end) {
  try { await api('/api/payroll-workflow/approve-timeoff-change', { method: 'POST', body: { period_start: start, period_end: end, center } }); renderPayrollWorkflow(); showToast('Change approved'); } catch(e) { alert(e.message); }

}

// ========================
// PAYROLL REPORT
// ========================
async function renderPayrollReport() {
  const el = document.getElementById('pageContent');
  
  let html = `<div style="display:flex;gap:8px;align-items:center;margin-bottom:20px">
    <button class="btn btn-primary" onclick="window.open('/api/payroll-report/pdf','_blank')">📄 Generate PDF Report</button>
  </div>`;
  
  try {
    const data = await api('/api/payroll-report');
    const pp = data.payPeriod;
    const report = data.report;
    
    // Group by center
    const byCenter = {};
    report.forEach(e => { if (!byCenter[e.center]) byCenter[e.center] = []; byCenter[e.center].push(e); });
    
    for (const [center, emps] of Object.entries(byCenter)) {
      let totalReg = 0, totalOT = 0, totalHrs = 0;
      html += `<div class="card"><div class="card-header"><h3>${center}</h3></div>
        <div class="card-body"><div class="table-scroll"><table class="data-table">
          <thead><tr><th>Name</th><th>Position</th><th style="text-align:right">Regular</th><th style="text-align:right">OT</th><th style="text-align:right">Total</th><th style="text-align:right">PTO Days</th><th style="text-align:right">Unpaid</th></tr></thead><tbody>`;
      
      emps.sort((a,b) => a.last_name.localeCompare(b.last_name));
      emps.forEach(e => {
        totalReg += e.regularHours; totalOT += e.overtimeHours; totalHrs += e.totalHours;
        html += `<tr ${e.overtimeHours > 0 ? 'style="background:var(--danger-bg)"' : ''}>
          <td><strong>${e.last_name}, ${e.first_name}</strong></td><td>${e.position||''}</td>
          <td style="text-align:right">${e.regularHours.toFixed(2)}</td>
          <td style="text-align:right;${e.overtimeHours>0?'color:var(--danger);font-weight:700':''}">${e.overtimeHours > 0 ? e.overtimeHours.toFixed(2) : '—'}</td>
          <td style="text-align:right;font-weight:600">${e.totalHours.toFixed(2)}</td>
          <td style="text-align:right;${e.ptoDays>0?'color:var(--info);font-weight:600':''}">${e.ptoDays||'—'}</td>
          <td style="text-align:right;${e.unpaidDays>0?'color:var(--warning);font-weight:600':''}">${e.unpaidDays||'—'}</td>
        </tr>`;
      });
      
      html += `<tr style="background:var(--navy);color:white;font-weight:700">
        <td colspan="2">TOTAL — ${center}</td>
        <td style="text-align:right">${totalReg.toFixed(2)}</td>
        <td style="text-align:right">${totalOT.toFixed(2)}</td>
        <td style="text-align:right">${totalHrs.toFixed(2)}</td>
        <td></td><td></td>
      </tr></tbody></table></div></div></div>`;
    }
    
    // Terminations
    if (data.terminations && data.terminations.length > 0) {
      html += `<div class="card" style="border-left:4px solid var(--danger)"><div class="card-header"><h3>Terminations — Action Required</h3></div>
        <div class="card-body"><table class="data-table"><thead><tr><th>Name</th><th>Center</th><th>Last Day</th><th>Reason</th></tr></thead><tbody>`;
      data.terminations.forEach(t => {
        html += `<tr><td><strong>${t.last_name}, ${t.first_name}</strong></td><td>${t.center}</td><td>${fmtDate(t.terminated_date)}</td><td>${t.termination_reason||''}</td></tr>`;
      });
      html += `</tbody></table></div></div>`;
    }
  } catch(e) { html += `<div style="color:var(--danger)">Error: ${e.message}</div>`; }
  
  el.innerHTML = html;
}

// ========================
// OVERTIME VIEW
// ========================
async function renderOvertimeView() {
  const el = document.getElementById('pageContent');
  
  let html = `<div style="display:flex;gap:8px;align-items:center;margin-bottom:20px;flex-wrap:wrap">
    <label style="font-weight:600;font-size:13px">Center:</label>
    <select id="otCenter" onchange="renderOvertimeView()" style="padding:8px 12px;border:1.5px solid var(--gray-200);border-radius:var(--radius-sm)">
      <option value="">All Centers</option>
      ${CENTERS.map(c => `<option value="${c}">${c}</option>`).join('')}
    </select>
    <label style="margin-left:16px"><input type="checkbox" id="otOnlyOT" onchange="renderOvertimeView()"> Show only OT employees</label>
  </div>`;
  
  try {
    const centerFilter = document.getElementById('otCenter')?.value || '';
    const otOnly = document.getElementById('otOnlyOT')?.checked || false;
    
    const data = await api(`/api/overtime-view${centerFilter ? '?center=' + encodeURIComponent(centerFilter) : ''}`);
    const pp = data.payPeriod;
    
    let displayEmps = data.employees.filter(e => e.hasHours);
    if (otOnly) displayEmps = displayEmps.filter(e => e.hasOT);
    
    if (displayEmps.length === 0) {
      html += `<div class="card"><div class="card-body"><p style="color:var(--gray-400)">No timecard data for this period.</p></div></div>`;
    } else {
      // Summary stats
      const totalOT = displayEmps.reduce((sum, e) => sum + e.totalOT, 0);
      const otCount = displayEmps.filter(e => e.hasOT).length;
      html += `<div class="stat-grid" style="margin-bottom:20px">
        <div class="stat-card"><div class="stat-label">Employees with Hours</div><div class="stat-value">${displayEmps.length}</div></div>
        <div class="stat-card" style="${otCount > 0 ? 'border-left:4px solid var(--danger)' : ''}"><div class="stat-label">With Overtime</div><div class="stat-value" style="color:${otCount>0?'var(--danger)':'var(--success)'}">${otCount}</div></div>
        <div class="stat-card"><div class="stat-label">Total OT Hours</div><div class="stat-value" style="color:${totalOT>0?'var(--danger)':'var(--success)'}">${totalOT.toFixed(1)}</div></div>
      </div>`;
      
      // Per-employee grid
      html += `<div class="card"><div class="card-body"><div class="table-scroll"><table class="data-table" style="font-size:11px">
        <thead><tr><th>Name</th><th>Center</th>`;
      
      // Column headers for each day across all weeks
      if (data.employees.length > 0 && data.employees[0].weeks) {
        data.employees[0].weeks.forEach(w => {
          w.days.forEach(d => {
            const inPP = d.date >= pp.start && d.date <= pp.end;
            html += `<th style="text-align:center;min-width:35px;font-size:9px;${!inPP?'color:var(--gray-300)':''}${d.dayName==='Sat'||d.dayName==='Sun'?';background:var(--gray-200)':''}">${d.dayName}<br>${d.date.slice(5)}</th>`;
          });
          html += `<th style="text-align:center;background:var(--navy);color:white;font-size:10px">Week</th>
            <th style="text-align:center;background:${true?'var(--danger-bg)':'var(--gray-50)'};font-size:10px;color:var(--danger)">OT</th>`;
        });
      }
      html += `<th style="text-align:right;font-weight:700">Period</th></tr></thead><tbody>`;
      
      displayEmps.forEach(emp => {
        html += `<tr><td style="white-space:nowrap;font-weight:600">${emp.last_name}, ${emp.first_name.charAt(0)}.</td><td style="font-size:10px">${emp.center}</td>`;
        emp.weeks.forEach(w => {
          w.days.forEach(d => {
            const bg = !d.inPayPeriod ? 'var(--gray-100)' : d.hours > 0 ? (d.hours > 8 ? 'var(--warning-bg)' : 'var(--success-bg)') : '';
            html += `<td style="text-align:center;${bg?'background:'+bg:''}">${d.hours > 0 ? d.hours.toFixed(1) : ''}</td>`;
          });
          html += `<td style="text-align:center;font-weight:600">${w.weekTotal.toFixed(1)}</td>`;
          html += `<td style="text-align:center;color:var(--danger);font-weight:600">${w.overtimeHours > 0 ? w.overtimeHours.toFixed(1) : ''}</td>`;
        });
        html += `<td style="text-align:right;font-weight:700;${emp.hasOT?'color:var(--danger)':''}">${emp.inPeriodHours.toFixed(1)}${emp.hasOT?' ('+emp.totalOT.toFixed(1)+' OT)':''}</td></tr>`;
      });
      
      html += `</tbody></table></div></div></div>`;
    }
  } catch(e) { html += `<div style="color:var(--danger)">Error: ${e.message}</div>`; }
  
  el.innerHTML = html;
}

// ========================
// PAY INCREASES
// ========================
async function renderPayIncreases() {
  const el = document.getElementById('pageContent');
  const canRequest = ['owner','hr'].includes(currentUser.role);
  const canApprove = ['owner','payroll'].includes(currentUser.role);
  
  let html = '';
  if (canRequest) {
    html += `<button class="btn btn-primary btn-sm" style="margin-bottom:16px" onclick="showRequestIncrease()">+ Request Pay Increase</button>`;
  }
  
  try {
    const pis = await api('/api/pay-increases');
    
    const pending = pis.filter(p => p.status === 'pending');
    const history = pis.filter(p => p.status !== 'pending');
    
    if (pending.length > 0) {
      html += `<div class="card" style="border-left:4px solid var(--warning)"><div class="card-header"><h3>Pending Requests</h3></div>
        <div class="card-body">`;
      pending.forEach(p => {
        html += `<div style="padding:12px;border:1px solid var(--gray-200);border-radius:var(--radius-sm);margin-bottom:8px">
          <div style="display:flex;justify-content:space-between;align-items:center">
            <div><strong>${p.last_name}, ${p.first_name}</strong> (${p.center})<br>
              <span style="font-size:13px">$${parseFloat(p.current_rate).toFixed(2)} → $${parseFloat(p.proposed_rate).toFixed(2)} · ${p.reason_category}</span>
              ${p.reason_detail ? `<br><span style="font-size:12px;color:var(--gray-400)">${p.reason_detail}</span>` : ''}
            </div>
            ${canApprove ? `<div style="display:flex;gap:6px">
              <button class="btn btn-sm" style="background:var(--success);color:white" onclick="reviewIncrease(${p.id},'approved')">✓ Approve</button>
              <button class="btn btn-outline btn-sm" onclick="reviewIncrease(${p.id},'denied')">✗ Deny</button>
            </div>` : ''}
          </div>
        </div>`;
      });
      html += `</div></div>`;
    }
    
    html += `<div class="card"><div class="card-header"><h3>History</h3></div>
      <div class="card-body"><table class="data-table"><thead><tr>
        <th>Name</th><th>Center</th><th>Previous</th><th>New</th><th>Reason</th><th>Status</th><th>Date</th>
      </tr></thead><tbody>`;
    history.forEach(p => {
      const statusBadge = p.status === 'approved' ? 'badge-success' : 'badge-danger';
      html += `<tr><td><strong>${p.last_name}, ${p.first_name}</strong></td><td>${p.center}</td>
        <td>$${parseFloat(p.current_rate).toFixed(2)}</td><td>$${parseFloat(p.proposed_rate).toFixed(2)}</td>
        <td>${p.reason_category}</td><td><span class="badge ${statusBadge}">${p.status}</span></td>
        <td>${fmtDate(p.reviewed_at || p.created_at)}</td></tr>`;
    });
    html += `</tbody></table></div></div>`;
  } catch(e) { html += `<div style="color:var(--danger)">Error: ${e.message}</div>`; }
  
  el.innerHTML = html;
}

function showRequestIncrease() {
  let html = `<div class="modal-header"><h3>Request Pay Increase</h3><button class="modal-close" onclick="closeModal()">&times;</button></div>
    <div class="modal-body">
      <div class="form-group"><label>Employee</label><select id="piEmployee">
        ${employees.map(e => `<option value="${e.id}" data-rate="${e.hourly_rate||0}">${e.last_name}, ${e.first_name} (${e.center}) — $${parseFloat(e.hourly_rate||0).toFixed(2)}/hr</option>`).join('')}
      </select></div>
      <div class="form-row"><div class="form-group"><label>Current Rate</label><input id="piCurrent" type="number" step="0.01" readonly></div>
      <div class="form-group"><label>Proposed Rate</label><input id="piProposed" type="number" step="0.01"></div></div>
      <div class="form-group"><label>Reason Category</label><select id="piCategory">
        <option>Annual Review</option><option>Promotion</option><option>Market Adjustment</option><option>Credential Earned</option><option>Performance</option><option>Other</option>
      </select></div>
      <div class="form-group"><label>Details</label><textarea id="piDetail" rows="3"></textarea></div>
    </div>
    <div class="modal-footer"><button class="btn btn-outline" onclick="closeModal()">Cancel</button>
    <button class="btn btn-primary" onclick="doRequestIncrease()">Submit Request</button></div>`;
  document.getElementById('modalContent').innerHTML = html;
  document.getElementById('modalOverlay').classList.add('active');
  
  const sel = document.getElementById('piEmployee');
  sel.addEventListener('change', function() {
    document.getElementById('piCurrent').value = this.options[this.selectedIndex].dataset.rate;
  });
  sel.dispatchEvent(new Event('change'));
}

async function doRequestIncrease() {
  try {
    await api('/api/pay-increases', { method: 'POST', body: {
      employee_id: parseInt(document.getElementById('piEmployee').value),
      current_rate: parseFloat(document.getElementById('piCurrent').value),
      proposed_rate: parseFloat(document.getElementById('piProposed').value),
      reason_category: document.getElementById('piCategory').value,
      reason_detail: document.getElementById('piDetail').value
    }});
    closeModal();
    renderPayIncreases();
    showToast('Pay increase requested');
  } catch(e) { alert(e.message); }
}

async function reviewIncrease(id, status) {
  const notes = status === 'denied' ? prompt('Reason for denial:') : '';
  try {
    await api(`/api/pay-increases/${id}`, { method: 'PUT', body: { status, review_notes: notes || '' } });
    renderPayIncreases();
    showToast(status === 'approved' ? 'Pay increase approved' : 'Pay increase denied', status === 'approved' ? 'success' : 'warning');
  } catch(e) { alert(e.message); }
}

      html += `<div class="center-tab ${selectedCenter===c?'active':''}" onclick="selectedCenter='${c}';renderPTOSummary()">${c}</div>`;

  }

  html += `<div class="card"><div class="card-body"><div class="table-scroll"><table class="data-table">
    <thead><tr><th>Name</th><th>Center</th><th>Years</th><th>Base</th><th>Tenure Bonus</th><th>Carryover</th><th>Total Available</th><th>Used</th><th>Remaining</th></tr></thead><tbody>`;

      <td>${(e.pto_carryover_hours||0)}h</td>
      <td style="font-weight:600">${p.totalMaxDays}d / ${p.totalMaxHours}h</td>
      <td>—</td><td>—</td>
    </tr>`;
  });
  
  html += `</tbody></table></div></div></div>`;
  el.innerHTML = html;
}

async function renderArchives() {

      <div class="card-body">`;
    
    if (archives.length === 0) {
      html += `<p style="color:var(--gray-400)">No archived reports yet. Generate a PDF from the Payroll Report page to automatically archive it.</p>`;
    } else {
      html += `<table class="data-table"><thead><tr><th>Pay Period</th><th>Pay Date</th><th>Generated By</th><th>Generated</th><th>PDF</th><th>Actions</th></tr></thead><tbody>`;
      archives.forEach(a => {
        html += `<tr>
          <td><strong>${a.period_label || fmtDate(a.period_start) + ' - ' + fmtDate(a.period_end)}</strong></td>
          <td>${fmtDate(a.pay_date)}</td>
          <td>${a.generated_by||''}</td>
          <td>${new Date(a.created_at).toLocaleDateString()}</td>

async function deleteArchive(id) {
  if (!confirm('Delete this archived report?')) return;
  try { await api(`/api/payroll-archives/${id}`, { method: 'DELETE' }); renderArchives(); showToast('Archive deleted', 'warning'); } catch(e) { alert(e.message); }
}

function showChangePassword() {
  let html = `<div class="modal-header"><h3>Change Password</h3><button class="modal-close" onclick="closeModal()">&times;</button></div>
    <div class="modal-body">
      <div class="form-group"><label>Current Password</label><input type="password" id="cpCurrent"></div>

async function doChangePassword() {
  const newPass = document.getElementById('cpNew').value;
  if (newPass !== document.getElementById('cpConfirm').value) return alert('Passwords do not match');
  try {
    await api('/api/change-password', { method: 'POST', body: {
      current_password: document.getElementById('cpCurrent').value,
      new_password: newPass
    }});
    closeModal();
    showToast('Password changed');
  } catch(e) { alert(e.message); }
}
